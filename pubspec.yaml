name: thirdly
description: "MedReminder – Smart Medicine Reminder & Care Assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  flutter_svg: ^2.0.9

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_messaging: ^16.0.0

  # State management
  provider: ^6.1.2

  # Auth & media
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2

  # Notifications & voice
  flutter_local_notifications: ^18.0.1
  flutter_tts: ^4.2.0
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
